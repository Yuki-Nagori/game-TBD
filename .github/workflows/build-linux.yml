name: Build Linux

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: stable
    
    - name: Cache dependencies
      id: cache-deps
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          engine/target
          ~/.xmake
          ~/.luarocks
          ~/.cargo/bin
        key: ${{ runner.os }}-build-${{ hashFiles('engine/Cargo.lock', 'engine/Cargo.toml', 'xmake.lua') }}
        restore-keys: |
          ${{ runner.os }}-build-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libasound2-dev \
          libudev-dev \
          libxkbcommon-dev \
          libwayland-dev \
          libx11-dev \
          libgl1-mesa-dev \
          libgles2-mesa-dev \
          libvulkan-dev \
          libegl1-mesa-dev \
          pkg-config \
          lua5.4 \
          luarocks

        # 安装 luacheck 和 stylua（使用本地安装避免权限问题）
        if [ "${{ steps.cache-deps.outputs.cache-hit }}" != "true" ]; then
          luarocks install --local luacheck --force
          cargo install stylua --force
        fi

        # 将 luarocks 和 cargo 二进制目录添加到 PATH
        echo "$HOME/.luarocks/bin:$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest
    
    - name: Build
      run: |
        xmake f -m release
        xmake b

    - name: Run format check
      run: |
        xmake format-check

    - name: Run full check
      run: |
        xmake check
