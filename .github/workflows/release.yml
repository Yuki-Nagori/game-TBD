name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev
      - uses: xmake-io/github-action-setup-xmake@v1
      - run: |
          xmake f -m release
          xmake b
      - uses: actions/upload-artifact@v4
        with:
          name: ming-rpg-linux
          path: build/linux/x86_64/release/ming-rpg

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - uses: xmake-io/github-action-setup-xmake@v1
      - run: |
          xmake f -m release
          xmake b
      - uses: actions/upload-artifact@v4
        with:
          name: ming-rpg-macos
          path: build/macos/x86_64/release/ming-rpg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - uses: xmake-io/github-action-setup-xmake@v1
      - run: |
          xmake f -m release
          xmake b
      - uses: actions/upload-artifact@v4
        with:
          name: ming-rpg-windows
          path: build/windows/x86_64/release/ming-rpg.exe

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            ming-rpg-linux/**
            ming-rpg-macos/**
            ming-rpg-windows/**
          generate_release_notes: true
