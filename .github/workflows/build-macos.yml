name: Build macOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: stable
    
    - name: Install dependencies
      run: |
        brew install pkg-config
    
    - name: Install xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          engine/target
          ~/.xmake
        key: ${{ runner.os }}-build-${{ hashFiles('engine/Cargo.lock', 'engine/Cargo.toml', 'xmake.lua') }}
        restore-keys: |
          ${{ runner.os }}-build-
    
    - name: Build (releasedbg)
      run: |
        xmake f -m releasedbg
        xmake b
    
    - name: Run tests
      run: xmake check
    
    - name: Build (release)
      run: |
        xmake f -m release
        xmake b
    
    - name: Pack
      run: xmake pack
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ming-rpg-macos
        path: dist/
