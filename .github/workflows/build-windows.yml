name: Build Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: stable

    - name: Configure git for line endings
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf

    - name: Install xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest

    - name: Cache dependencies
      id: cache-deps
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          engine/target
          ~/.xmake
          ~/.luarocks
          ~/.cargo/bin
        key: ${{ runner.os }}-build-${{ hashFiles('engine/Cargo.lock', 'engine/Cargo.toml', 'xmake.lua') }}
        restore-keys: |
          ${{ runner.os }}-build-

    - name: Install Lua
      run: |
        choco install -y lua luarocks
        echo "$env:APPDATA\luarocks\bin" >> $env:GITHUB_PATH

    - name: Install Rust tools
      shell: pwsh
      run: |
        # 检查并安装 sccache
        if (!(Get-Command sccache -ErrorAction SilentlyContinue)) {
          Write-Host "Installing sccache..."
          cargo install sccache
        } else {
          Write-Host "sccache already installed"
        }
        # 检查并安装 stylua
        if (!(Get-Command stylua -ErrorAction SilentlyContinue)) {
          Write-Host "Installing stylua..."
          cargo install stylua
        } else {
          Write-Host "stylua already installed"
        }
        "$env:USERPROFILE\.cargo\bin" >> $env:GITHUB_PATH

    - name: Configure
      run: xmake f -m release

    - name: Install Lua tools
      run: |
        luarocks install luacheck
        luarocks install busted

    - name: Build
      run: xmake b

    - name: Fix line endings for Rust files
      run: |
        # Convert CRLF to LF for Rust files
        Get-ChildItem -Recurse -Filter "*.rs" -Path . | ForEach-Object {
          (Get-Content $_.FullName -Raw) -replace "`r`n", "`n" | Set-Content -NoNewline $_.FullName
        }

    - name: Run format check
      run: |
        xmake format-check

    - name: Run full check
      run: |
        xmake check
