name: Build Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: stable
    
    - name: Install xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest

    - name: Install Lua dependencies (Windows)
      run: |
        choco install -y lua luarocks

        # 安装 luacheck 和 stylua
        luarocks install luacheck
        cargo install stylua

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          engine/target
          ~/.xmake
          ~/.luarocks
          ~/.cargo/bin
        key: ${{ runner.os }}-build-${{ hashFiles('engine/Cargo.lock', 'engine/Cargo.toml', 'xmake.lua') }}
        restore-keys: |
          ${{ runner.os }}-build-
    
    - name: Build
      run: |
        xmake f -m release
        xmake b

    - name: Run format check
      run: |
        xmake format-check

    - name: Run full check
      run: |
        xmake check
