name: Build Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: stable

    - name: Configure git for line endings
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf

    - name: Install xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest

    - name: Cache dependencies
      id: cache-deps
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          engine/target
          ~/.xmake
          ~/.luarocks
          ~/.cargo/bin
        key: ${{ runner.os }}-build-${{ hashFiles('engine/Cargo.lock', 'engine/Cargo.toml', 'xmake.lua') }}
        restore-keys: |
          ${{ runner.os }}-build-

    - name: Install Lua dependencies (Windows)
      run: |
        choco install -y lua luarocks

        # 安装 sccache、luacheck 和 stylua（缓存未命中时执行）
        cargo install sccache 2>$null || echo "sccache already installed or cached"
        luarocks install luacheck
        cargo install stylua 2>$null || echo "stylua already installed or cached"

    - name: Add tools to PATH
      run: |
        echo "$env:USERPROFILE\.cargo\bin" >> $env:GITHUB_PATH
        echo "$env:APPDATA\luarocks\bin" >> $env:GITHUB_PATH

    - name: Build
      run: |
        xmake f -m release
        xmake b

    - name: Fix line endings for Rust files
      run: |
        # Convert CRLF to LF for Rust files
        Get-ChildItem -Recurse -Filter "*.rs" -Path . | ForEach-Object {
          (Get-Content $_.FullName -Raw) -replace "`r`n", "`n" | Set-Content -NoNewline $_.FullName
        }

    - name: Run format check
      run: |
        xmake format-check

    - name: Run full check
      run: |
        xmake check
