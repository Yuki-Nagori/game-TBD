name: Build Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: stable

    - name: Configure git for line endings
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf

    - name: Install xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest

    - name: Cache dependencies
      id: cache-deps
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          engine/target
          ~/.xmake
          ~/tools
        key: ${{ runner.os }}-build-${{ hashFiles('engine/Cargo.lock', 'engine/Cargo.toml', 'xmake.lua') }}
        restore-keys: |
          ${{ runner.os }}-build-

    - name: Install Lua tools
      shell: pwsh
      run: |
        $toolsDir = "$env:USERPROFILE\tools"
        New-Item -ItemType Directory -Force -Path $toolsDir | Out-Null
        "$toolsDir" >> $env:GITHUB_PATH

        # 检查缓存是否命中
        if ((Test-Path "$toolsDir\luacheck.exe") -and (Test-Path "$toolsDir\lua.exe") -and (Test-Path "$toolsDir\busted.bat")) {
          Write-Host "Lua tools found in cache, skipping installation"
          exit 0
        }

        # 下载 luacheck 预编译二进制
        Write-Host "Installing luacheck..."
        $luacheckUrl = "https://github.com/lunarmodules/luacheck/releases/download/v1.2.0/luacheck.exe"
        Invoke-WebRequest -Uri $luacheckUrl -OutFile "$toolsDir\luacheck.exe"
        Write-Host "luacheck installed"

        # 下载 LuaJIT
        Write-Host "Installing LuaJIT..."
        $luajitUrl = "https://github.com/openresty/luajit2/releases/download/v2.1-20240815/luajit2-2.1-20240815-win64.zip"
        Invoke-WebRequest -Uri $luajitUrl -OutFile "luajit.zip"
        Expand-Archive -Path "luajit.zip" -DestinationPath "$toolsDir\luajit" -Force
        Copy-Item "$toolsDir\luajit\luajit.exe" "$toolsDir\lua.exe" -Force
        Remove-Item "luajit.zip" -ErrorAction SilentlyContinue
        Write-Host "LuaJIT installed"

        # 安装 busted (LuaJIT + 源码方式)
        Write-Host "Installing busted..."
        $bustedDir = "$toolsDir\busted"
        New-Item -ItemType Directory -Force -Path $bustedDir | Out-Null

        $deps = @(
          @{Name="luafilesystem";Url="https://github.com/keplerproject/luafilesystem/archive/refs/tags/v1_8_0.zip"},
          @{Name="busted";Url="https://github.com/lunarmodules/busted/archive/refs/tags/v2.2.0.zip"}
        )

        foreach ($dep in $deps) {
          $zipFile = "$($dep.Name).zip"
          Invoke-WebRequest -Uri $dep.Url -OutFile $zipFile
          Expand-Archive -Path $zipFile -DestinationPath "$bustedDir" -Force
          Remove-Item $zipFile
        }

        @"
@echo off
set "LUA_PATH=$toolsDir\busted\busted-2.2.0\?.lua;$toolsDir\busted\busted-2.2.0\?\init.lua;;"
"$toolsDir\lua.exe" "$bustedDir\busted-2.2.0\bin\busted" %*
"@ | Set-Content -Path "$toolsDir\busted.bat" -Encoding ASCII

        Write-Host "busted installed"

    - name: Install Rust tools
      shell: pwsh
      run: |
        # 安装 sccache（使用预编译二进制避免编译错误）
        if (!(Get-Command sccache -ErrorAction SilentlyContinue)) {
          Write-Host "Installing sccache from GitHub releases..."
          $url = "https://github.com/mozilla/sccache/releases/download/v0.7.7/sccache-v0.7.7-x86_64-pc-windows-msvc.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile "sccache.tar.gz"
          tar -xzf sccache.tar.gz
          Move-Item -Path "sccache-v0.7.7-x86_64-pc-windows-msvc/sccache.exe" -Destination "$env:USERPROFILE\.cargo\bin\" -Force
          Remove-Item -Recurse -Force "sccache-v0.7.7-x86_64-pc-windows-msvc", "sccache.tar.gz"
          Write-Host "sccache installed successfully"
        } else {
          Write-Host "sccache already installed"
        }
        # 安装 stylua
        if (!(Get-Command stylua -ErrorAction SilentlyContinue)) {
          Write-Host "Installing stylua..."
          cargo install stylua
        } else {
          Write-Host "stylua already installed"
        }
        "$env:USERPROFILE\.cargo\bin" >> $env:GITHUB_PATH

    - name: Configure
      run: xmake f -m release

    - name: Build
      run: xmake b

    - name: Fix line endings for Rust files
      run: |
        # Convert CRLF to LF for Rust files
        Get-ChildItem -Recurse -Filter "*.rs" -Path . | ForEach-Object {
          (Get-Content $_.FullName -Raw) -replace "`r`n", "`n" | Set-Content -NoNewline $_.FullName
        }

    - name: Run format check
      run: |
        xmake format-check

    - name: Run full check
      run: |
        xmake check
